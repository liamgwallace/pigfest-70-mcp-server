services:
  pigfest-70-mcp-server:
    image: ${GHCR_IMAGE:-ghcr.io/liamgwallace/pigfest-70-mcp-server:latest}
    container_name: pigfest-70-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    environment:
      GDRIVE_FOLDER_ID: ${GDRIVE_FOLDER_ID}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${GDRIVE_SERVICE_ACCOUNT_JSON}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-30}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
    volumes:
      - mcp_data:/data
      - mcp_logs:/logs

volumes:
  mcp_data:
  mcp_logs:
